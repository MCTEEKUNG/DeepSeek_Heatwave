name: Weekly heatwave forecast

# พยากรณ์อัตโนมัติทุกสัปดาห์ (ผู้ดูแลไม่ต้องทำอะไร) :
#   ดึง ERA5 ~70 วันล่าสุด + ดัชนี MJO/Niño -> predict (operational) -> commit docs/forecast.json
# ถ้า CDS ล่ม/คิวช้า -> step ดาวน์โหลด fail -> ไม่ commit -> เว็บยังโชว์พยากรณ์รอบก่อน
# GitHub ส่งอีเมลแจ้งอัตโนมัติเมื่อ workflow fail (ไม่ต้องตั้งเพิ่ม)

on:
  schedule:
    - cron: "0 2 * * 1"      # ทุกวันจันทร์ 02:00 UTC (~09:00 ไทย)
  workflow_dispatch: {}       # กดรันเองได้จากหน้า Actions

permissions:
  contents: write             # ให้ commit + push docs/forecast.json กลับ repo ได้

concurrency:
  group: forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: ติดตั้ง dependencies
        run: pip install -r requirements.txt

      - name: ตั้งค่า CDS API key
        run: printf '%s\n' "${{ secrets.CDSAPIRC }}" > "$HOME/.cdsapirc"

      - name: ดึง ERA5 ล่าสุด (~70 วัน) เข้า raw_recent/
        run: python scripts/download_era5_hourly_aggregate.py recent

      - name: รีเฟรชดัชนี MJO + Niño3.4
        run: python scripts/download_indices.py

      - name: ทำนาย (operational) -> docs/forecast.json
        run: python scripts/predict.py operational

      - name: ตรวจ forecast.json ก่อน commit (ปลอดภัย)
        run: |
          python - <<'PY'
          import json, sys
          fc = json.load(open("docs/forecast.json", encoding="utf-8"))
          assert len(fc["forecasts"]) == 5, "ต้องมี 5 lead"
          for f in fc["forecasts"]:
              p = f["probability"]
              assert 0.0 <= p <= 1.0, f"prob หลุดช่วง: {p}"
          print("forecast.json ผ่านการตรวจ:", fc["issue_date"])
          PY

      - name: Commit + push ถ้ามีการเปลี่ยนแปลง
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/forecast.json
          if git diff --staged --quiet; then
            echo "ไม่มีการเปลี่ยนแปลง — ข้ามการ commit"
          else
            git commit -m "chore: อัปเดตพยากรณ์อัตโนมัติ $(date -u +%Y-%m-%d)"
            git push
          fi
