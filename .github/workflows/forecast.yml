name: Weekly heatwave forecast

# พยากรณ์อัตโนมัติทุกสัปดาห์ (ผู้ดูแลไม่ต้องทำอะไร) :
#   ดึง ERA5 ~70 วันล่าสุด + ดัชนี MJO/Niño -> predict_provinces (operational)
#   -> validate + readiness gate -> commit docs/forecast_provinces.json
#   -> push ไป heatwave-contract (GitHub Pages) -> frontend ดึงอัตโนมัติ
# ถ้า CDS ล่ม/คิวช้า -> step ดาวน์โหลด fail -> ไม่ commit -> เว็บยังโชว์พยากรณ์รอบก่อน
# GitHub ส่งอีเมลแจ้งอัตโนมัติเมื่อ workflow fail (ไม่ต้องตั้งเพิ่ม)
#
# Secrets ที่ต้องตั้งใน repo settings:
#   CDSAPIRC          — ข้อความเต็มของ ~/.cdsapirc (url + key)
#   GH_CONTRACT_TOKEN — GitHub PAT ที่มีสิทธิ์ write ใน MCTEEKUNG/heatwave-contract

on:
  schedule:
    - cron: "0 2 * * 1"      # ทุกวันจันทร์ 02:00 UTC (~09:00 ไทย)
  workflow_dispatch: {}       # กดรันเองได้จากหน้า Actions

permissions:
  contents: write             # ให้ commit + push docs/forecast_provinces.json กลับ repo ได้

concurrency:
  group: forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BRIDGE_CONTRACT_DIR: ${{ github.workspace }}/heatwave-contract
      BRIDGE_FRONTEND_DIR: ${{ github.workspace }}/frontend_sink

    steps:
      - uses: actions/checkout@v4

      - name: Checkout heatwave-contract (sink สำหรับ GitHub Pages)
        uses: actions/checkout@v4
        with:
          repository: MCTEEKUNG/heatwave-contract
          path: heatwave-contract
          token: ${{ secrets.GH_CONTRACT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: ติดตั้ง dependencies
        run: pip install -r requirements.txt

      - name: ตั้งค่า CDS API key
        run: printf '%s\n' "${{ secrets.CDSAPIRC }}" > "$HOME/.cdsapirc"

      - name: ดึง ERA5 ล่าสุด (~70 วัน) เข้า raw_recent/
        run: python scripts/download_era5_hourly_aggregate.py recent

      - name: รีเฟรชดัชนี MJO + Niño3.4
        run: python scripts/download_indices.py

      - name: ตั้งค่า git identity สำหรับ heatwave-contract push
        run: |
          git -C "$BRIDGE_CONTRACT_DIR" config user.name  "github-actions[bot]"
          git -C "$BRIDGE_CONTRACT_DIR" config user.email "github-actions[bot]@users.noreply.github.com"

      - name: ทำนาย (operational) + validate + publish -> GitHub Pages
        run: python scripts/publish_bridge.py --publish

      - name: Commit docs/forecast_provinces.json กลับ repo หลัก
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/forecast_provinces.json
          if git diff --staged --quiet; then
            echo "ไม่มีการเปลี่ยนแปลง — ข้ามการ commit"
          else
            git commit -m "data: อัปเดตพยากรณ์รายจังหวัด $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
